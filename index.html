<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Tracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-bubble { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .pulse-ring { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-100 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center">
                        <i class="fas fa-whatsapp text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">WhatsApp Tracker</h1>
                        <p class="text-sm text-gray-500">Real-time session monitoring</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-green-600 font-medium flex items-center">
                        <i class="fas fa-circle text-xs mr-1"></i> Live
                    </span>
                    <button id="refreshBtn" class="p-2 text-gray-400 hover:text-green-500 hover:bg-green-50 rounded-lg transition-all">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Stats Cards -->
            <div class="lg:col-span-1 space-y-6">
                <!-- Active Sessions -->
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <p class="text-sm font-medium text-gray-600">Active Sessions</p>
                            <p class="text-3xl font-bold text-gray-900" id="activeSessions">3</p>
                        </div>
                        <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center">
                            <i class="fas fa-mobile-alt text-green-600 text-2xl"></i>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between text-sm">
                            <span>Desktop</span>
                            <span class="font-semibold text-green-600">1</span>
                        </div>
                        <div class="flex items-center justify-between text-sm">
                            <span>Mobile</span>
                            <span class="font-semibold text-blue-600">2</span>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                    <h3 class="text-lg font-semibold text-gray-900 mb-6 flex items-center">
                        <i class="fas fa-clock text-orange-500 mr-2"></i>
                        Recent Activity
                    </h3>
                    <div id="recentActivity" class="space-y-4 max-h-80 overflow-y-auto">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>

            <!-- Main Chat Monitor -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Live Messages -->
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold text-gray-900 flex items-center">
                            <i class="fas fa-comments text-green-500 mr-3"></i>
                            Live Messages
                        </h3>
                        <div class="flex items-center space-x-2">
                            <span class="px-3 py-1 bg-green-100 text-green-800 text-xs font-medium rounded-full">47 msg/min</span>
                            <div class="w-3 h-3 bg-green-500 rounded-full pulse-ring animate-ping"></div>
                        </div>
                    </div>
                    <div id="liveMessages" class="space-y-4 max-h-96 overflow-y-auto">
                        <!-- Dynamic messages -->
                    </div>
                </div>

                <!-- Connected Devices -->
                <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-900 mb-6">Connected Devices</h3>
                    <div id="devicesList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Dynamic devices -->
                    </div>
                </div>
            </div>
        </div>

        <!-- QR Scanner (Hidden by default) -->
        <div id="qrScanner" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4">
                <div class="text-center mb-6">
                    <div class="w-20 h-20 bg-green-500 rounded-xl flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-qrcode text-white text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">Scan QR Code</h3>
                    <p class="text-gray-600">Scan with WhatsApp to connect</p>
                </div>
                <div id="qrCanvas" class="w-full h-64 bg-gray-200 rounded-xl flex items-center justify-center mb-4">
                    <i class="fas fa-qrcode text-4xl text-gray-400"></i>
                </div>
                <button id="closeQr" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-900 py-3 px-4 rounded-xl font-medium transition-all">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // Demo data
        const sessions = [
            { id: 1, name: 'iPhone 14', type: 'mobile', status: 'active', lastSeen: '2 min ago', ip: '192.168.1.45' },
            { id: 2, name: 'Chrome - Work', type: 'desktop', status: 'active', lastSeen: '5 min ago', ip: '192.168.1.67' },
            { id: 3, name: 'Samsung S23', type: 'mobile', status: 'active', lastSeen: '12 min ago', ip: '192.168.1.89' }
        ];

        const messages = [
            { time: '10:23', sender: 'John Doe', message: 'Hey! Meeting at 3 PM?', avatar: '🧑‍💼' },
            { time: '10:24', sender: 'Sarah Wilson', message: 'Sent you the report ✅', avatar: '👩‍💻' },
            { time: '10:25', sender: 'Mike Chen', message: 'Can we reschedule?', avatar: '🧑‍🔧' }
        ];

        // Initialize dashboard
        function initDashboard() {
            renderDevices();
            renderLiveMessages();
            renderRecentActivity();
            startAutoRefresh();
        }

        function renderDevices() {
            const devicesList = document.getElementById('devicesList');
            devicesList.innerHTML = sessions.map(device => `
                <div class="p-4 bg-gradient-to-r from-gray-50 to-gray-100 rounded-xl border border-gray-200 hover:shadow-md transition-all">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br ${
                                device.type === 'mobile' ? 'from-green-400 to-green-600' : 'from-blue-400 to-blue-600'
                            }">
                                <i class="fas fa-${device.type === 'mobile' ? 'mobile-alt' : 'desktop'} text-white text-sm"></i>
                            </div>
                            <div>
                                <p class="font-semibold text-gray-900">${device.name}</p>
                                <p class="text-xs text-gray-500">${device.ip}</p>
                            </div>
                        </div>
                        <span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-medium rounded-full">Live</span>
                    </div>
                    <div class="flex items-center justify-between text-sm text-gray-600">
                        <span>Last seen: ${device.lastSeen}</span>
                        <button class="text-red-500 hover:text-red-700 text-xs font-medium">
                            <i class="fas fa-power-off mr-1"></i>Logout
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderLiveMessages() {
            const liveMessages = document.getElementById('liveMessages');
            liveMessages.innerHTML = messages.map(msg => `
                <div class="flex items-start space-x-3 p-4 bg-white rounded-xl border-l-4 border-green-500 hover:shadow-sm transition-all">
                    <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="text-white font-semibold text-sm">${msg.avatar}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center space-x-2 mb-1">
                            <p class="font-semibold text-gray-900 text-sm truncate">${msg.sender}</p>
                            <span class="text-xs text-gray-500">${msg.time}</span>
                        </div>
                        <p class="text-gray-800 text-sm">${msg.message}</p>
                    </div>
                </div>
            `).join('');
            liveMessages.scrollTop = liveMessages.scrollHeight;
        }

        function renderRecentActivity() {
            const recentActivity = document.getElementById('recentActivity');
            const activities = [
                { time: '10:25', action: '📱 Sarah logged in', device: 'iPhone 14' },
                { time: '10:23', action: '💻 Mike sent 5 messages', device: 'Chrome' },
                { time: '10:20', action: '📊 New group created', device: 'Samsung' }
            ];
            
            recentActivity.innerHTML = activities.map(activity => `
                <div class="flex items-center p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-all">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-circle text-blue-500 text-sm"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-gray-900 text-sm">${activity.action}</p>
                        <p class="text-xs text-gray-500">${activity.device} • ${activity.time}</p>
                    </div>
                </div>
            `).join('');
        }

        function startAutoRefresh() {
            setInterval(() => {
                // Simulate new data
                document.getElementById('activeSessions').textContent = Math.floor(Math.random() * 5) + 1;
                renderLiveMessages();
                renderRecentActivity();
            }, 5000);
        }

        // Event listeners
        document.getElementById('refreshBtn').addEventListener('click', () => {
            document.getElementById('refreshBtn').classList.add('animate-spin');
            setTimeout(() => {
                document.getElementById('refreshBtn').classList.remove('animate-spin');
                initDashboard();
            }, 1000);
        });

        document.getElementById('closeQr').addEventListener('click', () => {
            document.getElementById('qrScanner').classList.add('hidden');
        });

        // Initialize
        initDashboard();
    </script>
</body>
                  </html>
